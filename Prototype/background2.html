<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax Background with Obstacles - Prototype</title>
    <style>
        body {
            background: black;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #canvas-bg {
            border: 3px solid white;
            width: 800px;
            height: 500px;
        }
    </style>
</head>

<body>
    <canvas id="canvas-bg"></canvas>

    <script>
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        const CANVAS_WIDTH = canvas.width = 800;
        const CANVAS_HEIGHT = canvas.height = 500;
        let gameSpeed = 2;

        // Array to store all obstacles
        let obstacles = [];

        // Background layers (using same image for all layers in this prototype)
        const backgroundLayer1 = new Image();
        backgroundLayer1.src = '/Sprites/Game_Background_38.jpg';

        // Obstacle image (replace with actual obstacle sprite path)
        const obstacleImage = new Image();
        obstacleImage.src = '/Sprites/cartoon-jungle-moss-shape-green-260nw-2550601109.jpg'; // Update with your obstacle image path

        /**
         * Adds a single obstacle at specified position
         * @param {number} x - X coordinate of the obstacle
         * @param {number} y - Y coordinate of the obstacle (defaults to ground level)
         */
        function addObstacle(x, y = CANVAS_HEIGHT - 100) {
            obstacles.push({
                x: x,
                y: y,
                width: 50, // Default obstacle width (adjust based on your sprite)
                height: 50, // Default obstacle height (adjust based on your sprite)
                image: obstacleImage
            });
        }

        /**
         * Generates a random quantity of obstacles (1-5)
         * @returns {number} Number of obstacles to generate
         */
        function generateQtyObstacle() {
            // Random number between 1 and 5
            return Math.floor(Math.random() * 5) + 1;
        }

        /**
         * Positions obstacles randomly within canvas width
         * @param {number} count - Number of obstacles to position
         * @returns {Array} Array of positioned obstacles with x coordinates
         */
        function positionObstacle(count) {
            const positionedObstacles = [];

            for (let i = 0; i < count; i++) {
                // Generate random x position between 100 and canvas width
                const randomX = Math.random() * (CANVAS_WIDTH - 200) + 100;

                // Add some variation to y position (ground with slight variations)
                const yVariation = Math.random() * 30 - 15; // -15 to +15 pixels
                const baseY = CANVAS_HEIGHT - 100; // Ground level

                positionedObstacles.push({
                    x: randomX,
                    y: baseY + yVariation,
                    width: 50,
                    height: 50
                });
            }

            return positionedObstacles;
        }

        // Initialize background positions for parallax
        let x = 0;
        let x2 = 800;

        // Generate initial obstacles when the page loads
        backgroundLayer1.onload = function () {
            // Generate random quantity of obstacles
            const obstacleCount = generateQtyObstacle();

            // Position the obstacles
            const initialObstacles = positionObstacle(obstacleCount);

            // Add obstacles to the game
            initialObstacles.forEach(obs => {
                addObstacle(obs.x, obs.y);
            });

            console.log(`Generated ${obstacleCount} obstacles at start`);
        };

        /**
         * Draws all obstacles on the canvas
         */
        function drawObstacles() {
            obstacles.forEach(obstacle => {
                ctx.fillStyle = 'red'; // Fallback color if image doesn't load
                ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);

                // Uncomment this block if you have an actual obstacle image
                /*
                if (obstacle.image.complete) {
                    ctx.drawImage(obstacle.image, obstacle.x, obstacle.y, obstacle.width, obstacle.height);
                } else {
                    // Fallback rectangle while image loads
                    ctx.fillStyle = 'red';
                    ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
                }
                */
            });
        }

        /**
         * Updates obstacle positions based on game speed (for moving obstacles with parallax)
         */
        function updateObstacles() {
            obstacles = obstacles.filter(obstacle => {
                // Move obstacle left with game speed
                obstacle.x -= gameSpeed;

                // Keep obstacle if it's still on screen
                return obstacle.x + obstacle.width > 0;
            });

            // Occasionally generate new obstacles
            if (Math.random() < 0.01) { // 1% chance per frame
                const newCount = generateQtyObstacle();
                const newObstacles = positionObstacle(newCount);
                newObstacles.forEach(obs => addObstacle(obs.x, obs.y));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // Draw background layers (parallax effect)
            ctx.drawImage(backgroundLayer1, x, 0);
            ctx.drawImage(backgroundLayer1, x2, 0);

            // Update and draw obstacles
            updateObstacles();
            drawObstacles();

            // Parallax background movement
            if (x < -800) x = 800 + x2 - gameSpeed;
            else x -= gameSpeed;

            if (x2 < -800) x2 = 800 + x - gameSpeed;
            else x2 -= gameSpeed;

            requestAnimationFrame(animate);
        };

        animate();

        // Example: Add obstacles at specific positions programmatically
        // addObstacle(300, 400); // Add obstacle at x=300, y=400
        // addObstacle(500, 420); // Add obstacle at x=500, y=420

        // Example: Generate and add a random set of obstacles
        // const randomCount = generateQtyObstacle();
        // const randomPositions = positionObstacle(randomCount);
        // randomPositions.forEach(pos => addObstacle(pos.x, pos.y));

        // Function to regenerate obstacles (can be called by game events)
        window.regenerateObstacles = function () {
            obstacles = []; // Clear existing obstacles
            const count = generateQtyObstacle();
            const positions = positionObstacle(count);
            positions.forEach(pos => addObstacle(pos.x, pos.y));
            console.log(`Regenerated ${count} obstacles`);
        };
    </script>
</body>

</html>
