<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax Background - Prototype</title>
    <style>
        body {
            background: black;
        }

        #canvas-bg {
            position: absolute;
            border: 3px solid white;
            width: 800px;
            height: 500px;
            transform: translate(-50%, -50%);
            top: 50%;
            left: 50%;
        }
    </style>
</head>

<body>
    <canvas id="canvas-bg"></canvas>

    <script>
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        const CANVAS_WIDTH = canvas.width = 2000;
        const CANVAS_HEIGHT = canvas.height = 1000;
        let gameSpeed = 5;

        // Background 1
        const background1 = new Image();
        background1.src = '/Sprites/Cartoon_Forest_BG_01.png';

        
        // Background Layers
        const backgroundLayer1 = new Image();
        backgroundLayer1.src - '/Sprites/Layers/Sky.png';

        const backgroundLayer2 = new Image();
        backgroundLayer2.src - '/Sprites/Layers/BG_Decor.png';

        const backgroundLayer3 = new Image();
        backgroundLayer3.src - '/Sprites/Layers/Foreground.png';

        const backgroundLayer4 = new Image();
        backgroundLayer4.src - '/Sprites/Layers/Ground.png';

        const backgroundLayer5 = new Image();
        backgroundLayer5.src - '/Sprites/Layers/Middle_Decor.png';

        let x = 0;
        let x2 = 1900;

        

        // Add the background music
        function addBackgroundMusic() {
            const music = new Audio('/Audio/audio1.mp3'); // path to your music
            music.loop = true;   // keeps playing
            music.volume = 0.5;  // optional volume control
            music.play();
        }

        // Create the parallax animation
        function animate() {
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            ctx.drawImage(background1, x, 0);
            ctx.drawImage(background1, x2, 0);

            if (x < -1900) x = 1900 + x2 - gameSpeed;
            else x -= gameSpeed;

            if (x2 < -1900) x2 = 1900 + x - gameSpeed;
            else x2 -= gameSpeed;
            requestAnimationFrame(animate);
        };

        // Calls all the functios
        document.addEventListener("click", addBackgroundMusic, { once: true });
        animate();
    </script>
</body>

</html>
