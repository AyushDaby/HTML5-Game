<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax Background - Prototype</title>

    <style>
        body {
            background: black;
        }

        #canvas-bg {
            position: absolute;
            border: 3px solid white;
            width: 800px;
            height: 500px;
            transform: translate(-50%, -50%);
            top: 50%;
            left: 50%;
        }
    </style>
</head>

<body>

    <canvas id="canvas-bg"></canvas>

    <script>

        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');

        const CANVAS_WIDTH = canvas.width = 2000;
        const CANVAS_HEIGHT = canvas.height = 1000;

        let gameSpeed = 5;


        // Background Layer 1
        const backgroundLayer1 = new Image();
        backgroundLayer1.src = '/Sprites/Layers/BG_Decor.png';

        // Background Layer 2
        const backgroundLayer2 = new Image();
        backgroundLayer2.src = '/Sprites/Layers/Foreground.png';

        // Background Layer 3
        const backgroundLayer3 = new Image();
        backgroundLayer3.src = '/Sprites/Layers/Ground.png';

        // Background Layer 4
        const backgroundLayer4 = new Image();
        backgroundLayer4.src = '/Sprites/Layers/Middle_Decor.png';

        // Background Layer 5
        const backgroundLayer5 = new Image();
        backgroundLayer5.src = '/Sprites/Layers/Sky.png';


        let x = 0;
        let x2 = 2000;

        // Flag to remove layers
        let removeLayers = false;


        // MERGE LAYERS FUNCTION
        function mergeLayers() {

            // SKY
            ctx.globalAlpha = 1;
            ctx.drawImage(backgroundLayer5, x, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            ctx.drawImage(backgroundLayer5, x2, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // BG DECOR
            ctx.globalAlpha = opacity.bgDecor;
            ctx.drawImage(backgroundLayer1, x, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            ctx.drawImage(backgroundLayer1, x2, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // MIDDLE DECOR
            ctx.globalAlpha = opacity.middleDecor;
            ctx.drawImage(backgroundLayer4, x, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            ctx.drawImage(backgroundLayer4, x2, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // GROUND
            ctx.globalAlpha = 1;
            ctx.drawImage(backgroundLayer3, x, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            ctx.drawImage(backgroundLayer3, x2, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // FOREGROUND
            ctx.globalAlpha = opacity.foreground;
            ctx.drawImage(backgroundLayer2, x, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            ctx.drawImage(backgroundLayer2, x2, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            ctx.globalAlpha = 1;
        }


        // ANIMATION LOOP
        function animate() {

            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            fadeLayer("foreground", 0.02);
            fadeLayer("middleDecor", 0.02);
            fadeLayer("bgDecor", 0.02);

            mergeLayers();

            if (x <= -CANVAS_WIDTH) x = CANVAS_WIDTH + x2 - gameSpeed;
            else x -= gameSpeed;

            if (x2 <= -CANVAS_WIDTH) x2 = CANVAS_WIDTH + x - gameSpeed;
            else x2 -= gameSpeed;

            requestAnimationFrame(animate);
        }


        // IMAGE LOADER
        function loadImages(callback) {

            const images = [
                backgroundLayer1,
                backgroundLayer2,
                backgroundLayer3,
                backgroundLayer4,
                backgroundLayer5
            ];

            let loaded = 0;

            images.forEach(img => {
                img.onload = () => {
                    loaded++;
                    if (loaded === images.length) {
                        callback();
                    }
                };
            });
        }


        // AFTER 10 SECONDS REMOVE LAYERS
        setTimeout(() => {
            fading.foreground = true;
        }, 10000);

        setTimeout(() => {
            fading.middleDecor = true;
        }, 12000);

        setTimeout(() => {
            fading.bgDecor = true;
        }, 14000);

        let opacity = {
            bgDecor: 1,
            foreground: 1,
            middleDecor: 1
        };

        let fading = {
            bgDecor: false,
            foreground: false,
            middleDecor: false
        };

        function fadeLayer(layerName, speed = 0.01) {
            if (fading[layerName] && opacity[layerName] > 0) {
                opacity[layerName] -= speed;

                if (opacity[layerName] < 0) {
                    opacity[layerName] = 0;
                }
            }
        }


        // START GAME
        loadImages(() => {
            animate();
        });

    </script>

</body>

</html>
